<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Breathing exercise app.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="breath_execise">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Breath Exercise</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      --bg-1: #eaf8f4;
      --bg-2: #d6efe8;
      --text: #113630;
      --muted: #456b64;
      --accent: #1f8f7c;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: radial-gradient(120% 120% at 50% 0%, var(--bg-1) 0%, var(--bg-2) 100%);
      font-family: "Segoe UI", "Noto Sans SC", "PingFang SC", sans-serif;
    }

    #startup-splash {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      z-index: 9999;
      transition: opacity 320ms ease, visibility 320ms ease;
      background: radial-gradient(120% 120% at 50% 0%, var(--bg-1) 0%, var(--bg-2) 100%);
    }

    #startup-splash.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .splash-card {
      width: min(88vw, 420px);
      padding: 28px 24px;
      border-radius: 20px;
      text-align: center;
      background: rgba(255, 255, 255, 0.78);
      box-shadow: 0 10px 30px rgba(17, 54, 48, 0.12);
      backdrop-filter: blur(4px);
    }

    .breath-orb {
      width: 92px;
      height: 92px;
      margin: 0 auto 16px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #68d8c2 0%, #2aa992 45%, #1f8f7c 100%);
      animation: breathe 2.8s ease-in-out infinite;
      box-shadow: 0 10px 24px rgba(31, 143, 124, 0.34);
    }

    @keyframes breathe {
      0%, 100% { transform: scale(0.78); }
      50% { transform: scale(1); }
    }

    .title {
      margin: 0;
      color: var(--text);
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="startup-splash" aria-live="polite" aria-label="Application loading">
    <div class="splash-card">
      <div class="breath-orb" aria-hidden="true"></div>
      <h1 class="title">呼吸练习</h1>
      <p class="subtitle">正在准备舒缓呼吸体验...</p>
    </div>
  </div>

  <script>
    (function () {
      const splash = document.getElementById('startup-splash');
      let hidden = false;

      function hideSplash() {
        if (hidden || !splash) return;
        hidden = true;
        splash.classList.add('hidden');
        window.setTimeout(() => splash.remove(), 350);
      }

      // Hide as soon as Flutter paints the app surface.
      const observer = new MutationObserver(() => {
        const pane = document.querySelector('flt-glass-pane');
        if (pane) {
          hideSplash();
          observer.disconnect();
        }
      });

      observer.observe(document.documentElement, { childList: true, subtree: true });

      // Fallback: ensure splash is not stuck forever.
      window.setTimeout(() => {
        hideSplash();
        observer.disconnect();
      }, 12000);
    })();
  </script>

  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
